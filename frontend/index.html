<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Vehicle Rental System</title>
	<style>
		:root {
			--bg1: #f2f7ff;
			--bg2: #dce9ff;
			--card: #ffffff;
			--text: #1f2a44;
			--muted: #5b6783;
			--primary: #2d6cdf;
			--primary-hover: #1f57ba;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			background: linear-gradient(135deg, var(--bg1), var(--bg2));
			color: var(--text);
		}

		.card {
			width: min(92vw, 420px);
			background: var(--card);
			border-radius: 14px;
			padding: 28px;
			box-shadow: 0 14px 35px rgba(31, 42, 68, 0.16);
			text-align: center;
		}

		h1 {
			margin: 0 0 10px;
			font-size: 1.5rem;
		}

		p {
			margin: 0 0 20px;
			color: var(--muted);
			line-height: 1.5;
		}

		button {
			border: none;
			border-radius: 10px;
			padding: 12px 18px;
			font-size: 1rem;
			font-weight: 600;
			background: var(--primary);
			color: #fff;
			cursor: pointer;
			transition: background 0.2s ease;
		}

		button:hover {
			background: var(--primary-hover);
		}

		.hint {
			margin-top: 14px;
			font-size: 0.9rem;
			color: var(--muted);
		}
	</style>
</head>
<body>
	<main class="card">
		<h1>Vehicle Rental System</h1>
		<p>Welcome! Click the button below to continue to the login page.</p>
		<button id="goLoginBtn" type="button">Go to Login</button>
		<div class="hint">You will be redirected automatically in 3 seconds.</div>
	</main>

	<script>
		function goToLogin() {
			window.location.href = "login.jsp";
		}

		document.getElementById("goLoginBtn").addEventListener("click", goToLogin);
		setTimeout(goToLogin, 3000);
	</script>
</body>
</html>
